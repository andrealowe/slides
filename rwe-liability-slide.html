<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Compliance Liability</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

    <style>
        /* ===========================================
           DOMINO LIGHT CORPORATE THEME
           Series continuity — matches the other five
           RWE slides.
           =========================================== */
        :root {
            --font-display: 'New Grotesk', 'Inter', 'Helvetica Neue', sans-serif;
            --font-body: 'New Grotesk', 'Inter', 'Helvetica Neue', sans-serif;
            --font-mono: 'New Grotesk Mono', 'JetBrains Mono', monospace;

            --bg-primary: #FFFFFF;
            --bg-surface: #F1F0F4;
            --text-primary: #000000;
            --text-secondary: #3C3A42;
            --text-muted: #777384;
            --accent: #FF6543;
            --divider: rgba(0, 0, 0, 0.08);

            --domino-gradient: linear-gradient(135deg, #FF9421 0%, #F8475E 34%, #F020B3 66%, #8636F8 100%);

            --eyebrow-size: clamp(0.95rem, 1.3vw, 1.35rem);
            --headline-size: clamp(2.75rem, 6.2vw, 6rem);
            --subline-size: clamp(1.1rem, 1.7vw, 1.6rem);

            --slide-padding: clamp(2rem, 6vw, 6rem);
            --content-gap: clamp(1rem, 2.5vw, 2.5rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: var(--slide-padding);
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            align-items: center;
            gap: clamp(2rem, 5vw, 5rem);
            position: relative;
        }

        .text-block {
            display: flex;
            flex-direction: column;
            gap: var(--content-gap);
            max-width: 100%;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: var(--eyebrow-size);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.75em;
        }

        .eyebrow::before {
            content: '';
            width: clamp(2rem, 3vw, 3rem);
            height: 2px;
            background: var(--accent);
            display: inline-block;
        }

        .headline {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: var(--headline-size);
            line-height: 1.02;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .headline .accent-line {
            display: block;
            background: var(--domino-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .subline {
            font-family: var(--font-body);
            font-size: var(--subline-size);
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-secondary);
            max-width: 34ch;
        }

        /* ===========================================
           ILLUSTRATION - three failure modes:
           Panel 1: Sprawl (scattered tools, no structure)
           Panel 2: Orphaned pipeline (broken lineage)
           Panel 3: Unreproducible (notebook with ?)
           =========================================== */
        .illustration {
            width: 100%;
            height: 100%;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .illustration svg {
            width: 100%;
            height: auto;
            max-height: 75vh;
            overflow: visible;
        }

        /* Sprawl shapes drift slightly — reinforcing ungoverned feel */
        .sprawl-shape {
            animation: sprawl-drift 6s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }
        @keyframes sprawl-drift {
            0%, 100% { opacity: 0.75; }
            50% { opacity: 0.4; }
        }

        /* Broken pipeline gap flashes — something's missing */
        .break-marker {
            animation: break-flash 2.5s ease-in-out infinite;
        }
        @keyframes break-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Question mark pulse — unreproducibility */
        .unknown-mark {
            animation: unknown-pulse 3s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }
        @keyframes unknown-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.08); }
        }

        /* ===========================================
           CORNER LOGO + EXPORT BUTTONS
           =========================================== */
        .corner-logo {
            position: fixed;
            bottom: clamp(1rem, 2vw, 1.75rem);
            left: clamp(1.5rem, 3vw, 2.5rem);
            height: clamp(22px, 2.4vw, 32px);
            width: auto;
            z-index: 1000;
            pointer-events: none;
        }

        .export-btns {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1001;
            display: flex;
            gap: 6px;
        }

        .export-btn {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.4);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .export-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            color: rgba(0, 0, 0, 0.7);
        }

        .export-btn:disabled { opacity: 0.5; cursor: wait; }

        /* ===========================================
           RESPONSIVE
           =========================================== */
        @media (max-width: 900px) {
            .slide {
                grid-template-columns: 1fr;
                gap: clamp(1rem, 3vw, 2rem);
            }
            .illustration { max-height: 35vh; }
            .illustration svg { max-height: 30vh; }
        }

        @media (max-height: 700px) {
            :root {
                --slide-padding: clamp(1.5rem, 4vw, 3rem);
                --headline-size: clamp(2.25rem, 5.5vw, 4.5rem);
            }
        }

        @media (max-height: 600px) {
            :root {
                --slide-padding: clamp(1rem, 3vw, 2rem);
                --headline-size: clamp(1.75rem, 5vw, 3.5rem);
                --subline-size: clamp(0.9rem, 1.5vw, 1.25rem);
                --content-gap: clamp(0.75rem, 1.5vw, 1.25rem);
            }
        }

        @media print {
            .export-btns, .corner-logo { display: none !important; }
            html, body { height: auto; background: #FFFFFF !important; }
            .slide { height: 100vh; overflow: hidden; break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            .sprawl-shape, .break-marker, .unknown-mark { animation: none; }
        }
    </style>
</head>
<body>

    <div class="export-btns">
        <button class="export-btn" onclick="document.querySelectorAll('.slide').forEach(s=>s.classList.add('visible'));setTimeout(()=>window.print(),100)" title="Export to PDF">PDF</button>
        <button class="export-btn" id="pptBtn" onclick="exportToPPT()" title="Download as PowerPoint">PPT</button>
    </div>

    <img src="domino-logo.png" class="corner-logo" alt="Domino">

    <section class="slide">
        <div class="text-block">
            <div class="eyebrow">The Risk</div>
            <h1 class="headline">
                Every ungoverned analysis
                <span class="accent-line">is a compliance liability.</span>
            </h1>
            <p class="subline">
                Life sciences amplifies the failure modes other industries absorb — every one compounds into audit exposure.
            </p>
        </div>

        <!-- Three failure modes as labeled panels:
             1. Sprawl — scattered disconnected tool shapes
             2. Orphaned Pipeline — broken lineage with gap
             3. Unreproducible — notebook with large ? -->
        <div class="illustration" aria-hidden="true">
            <svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="domino-grad-6" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FF9421"/>
                        <stop offset="34%" stop-color="#F8475E"/>
                        <stop offset="66%" stop-color="#F020B3"/>
                        <stop offset="100%" stop-color="#8636F8"/>
                    </linearGradient>
                </defs>

                <!-- Unifying top header (muted — this is a problem pattern) -->
                <line x1="60" y1="75" x2="460" y2="75"
                      stroke="#777384" stroke-width="1"
                      stroke-dasharray="4 4" opacity="0.6"/>
                <text x="260" y="60"
                      font-family="'JetBrains Mono', monospace"
                      font-size="11" font-weight="500" letter-spacing="3"
                      text-anchor="middle" fill="#000">FAILURE MODES</text>

                <!-- ===== PANEL 1: SPRAWL (ungoverned tools) ===== -->
                <g transform="translate(75, 135)">
                    <!-- 8 scattered shapes, outlined, no connections -->
                    <circle class="sprawl-shape" cx="12" cy="14" r="7"
                            fill="none" stroke="#000" stroke-width="1.5"
                            style="animation-delay: 0s;"/>
                    <rect class="sprawl-shape" x="38" y="6" width="14" height="14"
                          fill="none" stroke="#000" stroke-width="1.5"
                          style="animation-delay: -0.7s;"/>
                    <polygon class="sprawl-shape" points="12,42 20,28 28,42"
                             fill="none" stroke="#000" stroke-width="1.5"
                             style="animation-delay: -1.4s;"/>
                    <polygon class="sprawl-shape" points="48,38 56,30 64,38 56,46"
                             fill="none" stroke="#000" stroke-width="1.5"
                             style="animation-delay: -2.1s;"/>
                    <circle class="sprawl-shape" cx="32" cy="28" r="5"
                            fill="none" stroke="#000" stroke-width="1.5"
                            style="animation-delay: -2.8s;"/>
                    <rect class="sprawl-shape" x="4" y="50" width="10" height="10"
                          fill="none" stroke="#000" stroke-width="1.5"
                          style="animation-delay: -3.5s;"/>
                    <polygon class="sprawl-shape" points="58,8 64,20 52,20"
                             fill="none" stroke="#000" stroke-width="1.5"
                             style="animation-delay: -4.2s;"/>
                    <circle class="sprawl-shape" cx="50" cy="58" r="4.5"
                            fill="#FF6543" opacity="0.9"
                            style="animation-delay: -4.9s;"/>
                </g>
                <text x="107" y="248"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="1.8"
                      text-anchor="middle" fill="#000">SPRAWL</text>
                <text x="107" y="270"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="1.5"
                      text-anchor="middle" fill="#777384">UNGOVERNED TOOLS</text>

                <!-- ===== PANEL 2: ORPHANED PIPELINE ===== -->
                <g>
                    <!-- Upstream nodes connected by solid line -->
                    <line x1="215" y1="175" x2="252" y2="175"
                          stroke="#000" stroke-width="1.8"/>
                    <circle cx="215" cy="175" r="5" fill="#000"/>
                    <circle cx="234" cy="175" r="5" fill="#000"/>
                    <circle cx="252" cy="175" r="5" fill="#000"/>

                    <!-- THE BREAK — dashed gap with orange X marker -->
                    <line x1="258" y1="175" x2="288" y2="175"
                          stroke="#777384" stroke-width="1.5"
                          stroke-dasharray="3 4" opacity="0.5"/>

                    <g class="break-marker" transform="translate(273, 175)">
                        <line x1="-6" y1="-6" x2="6" y2="6"
                              stroke="#FF6543" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="-6" y1="6" x2="6" y2="-6"
                              stroke="#FF6543" stroke-width="2.5" stroke-linecap="round"/>
                    </g>

                    <!-- Orphaned downstream node (floating, disconnected) -->
                    <circle cx="296" cy="175" r="5" fill="none"
                            stroke="#000" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="318" cy="175" r="5" fill="none"
                            stroke="#000" stroke-width="1.5" opacity="0.5"/>

                    <!-- Lineage label above, broken -->
                    <text x="234" y="155"
                          font-family="'JetBrains Mono', monospace"
                          font-size="8" letter-spacing="1"
                          text-anchor="middle" fill="#777384">LINEAGE</text>
                    <text x="307" y="155"
                          font-family="'JetBrains Mono', monospace"
                          font-size="8" letter-spacing="1"
                          text-anchor="middle" fill="#777384" opacity="0.5">???</text>
                </g>
                <text x="267" y="248"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="1.8"
                      text-anchor="middle" fill="#000">ORPHANED</text>
                <text x="267" y="270"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="1.5"
                      text-anchor="middle" fill="#777384">NO LINEAGE</text>

                <!-- ===== PANEL 3: UNREPRODUCIBLE ===== -->
                <g>
                    <!-- Notebook/code window -->
                    <rect x="381" y="140" width="64" height="72" rx="5"
                          fill="none" stroke="#000" stroke-width="1.5"/>

                    <!-- Notebook "tab" bar at top -->
                    <line x1="381" y1="153" x2="445" y2="153"
                          stroke="#000" stroke-width="1" opacity="0.4"/>
                    <circle cx="387" cy="147" r="1.5" fill="#777384"/>
                    <circle cx="393" cy="147" r="1.5" fill="#777384"/>
                    <circle cx="399" cy="147" r="1.5" fill="#777384"/>

                    <!-- Code lines inside (faded — "code that ran once") -->
                    <line x1="388" y1="163" x2="420" y2="163"
                          stroke="#000" stroke-width="1.5" opacity="0.5"/>
                    <line x1="388" y1="173" x2="430" y2="173"
                          stroke="#000" stroke-width="1.5" opacity="0.5"/>
                    <line x1="388" y1="183" x2="415" y2="183"
                          stroke="#000" stroke-width="1.5" opacity="0.5"/>
                    <line x1="388" y1="193" x2="425" y2="193"
                          stroke="#000" stroke-width="1.5" opacity="0.5"/>
                    <line x1="388" y1="203" x2="412" y2="203"
                          stroke="#000" stroke-width="1.5" opacity="0.5"/>

                    <!-- Large ? overlay — the unknowable reproducibility -->
                    <text class="unknown-mark"
                          x="450" y="145"
                          font-family="'Inter', sans-serif"
                          font-size="36" font-weight="700"
                          fill="#FF6543">?</text>
                </g>
                <text x="413" y="248"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="1.8"
                      text-anchor="middle" fill="#000">UNREPRODUCIBLE</text>
                <text x="413" y="270"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="1.5"
                      text-anchor="middle" fill="#777384">CODE THAT RAN ONCE</text>

                <!-- Bottom unifying tag -->
                <text x="260" y="335"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="2"
                      text-anchor="middle" fill="#777384">COMPOUNDING · COMPLIANCE EXPOSURE</text>
            </svg>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script>
        async function exportToPPT() {
            const btn = document.getElementById('pptBtn');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                const pptx = new PptxGenJS();
                pptx.defineLayout({ name: 'HD', width: 13.333, height: 7.5 });
                pptx.layout = 'HD';

                const s = pptx.addSlide();
                s.background = { color: 'FFFFFF' };

                s.addText('THE RISK', {
                    x: 0.7, y: 2.0, w: 7, h: 0.4,
                    fontSize: 14, fontFace: 'Arial',
                    color: 'FF6543', bold: true, charSpacing: 3,
                });

                s.addText([
                    { text: 'Every ungoverned analysis\n', options: { color: '000000' } },
                    { text: 'is a compliance liability.', options: { color: 'F020B3' } },
                ], {
                    x: 0.7, y: 2.6, w: 7, h: 2.4,
                    fontSize: 46, fontFace: 'Arial', bold: true,
                });

                s.addText(
                    'Life sciences amplifies the failure modes other industries absorb — every one compounds into audit exposure.',
                    {
                        x: 0.7, y: 5.2, w: 7, h: 1.4,
                        fontSize: 18, fontFace: 'Arial', color: '3C3A42',
                    }
                );

                s.addText('SPRAWL · ORPHANED · UNREPRODUCIBLE', {
                    x: 8.0, y: 4.0, w: 5.0, h: 0.5,
                    fontSize: 12, fontFace: 'Arial',
                    color: '777384', charSpacing: 2,
                });

                await pptx.writeFile({ fileName: 'rwe-liability-slide.pptx' });
            } catch (e) {
                console.error('PPT export failed:', e);
                alert('PPT export failed. See console.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'PPT';
            }
        }
    </script>
</body>
</html>
