<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Enough. Defensible Enough.</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

    <style>
        /* ===========================================
           DOMINO LIGHT CORPORATE THEME
           Matches rwe-translation-slide and
           rwe-bottleneck-slide for video series consistency.
           =========================================== */
        :root {
            --font-display: 'New Grotesk', 'Inter', 'Helvetica Neue', sans-serif;
            --font-body: 'New Grotesk', 'Inter', 'Helvetica Neue', sans-serif;
            --font-mono: 'New Grotesk Mono', 'JetBrains Mono', monospace;

            --bg-primary: #FFFFFF;
            --bg-surface: #F1F0F4;
            --text-primary: #000000;
            --text-secondary: #3C3A42;
            --text-muted: #777384;
            --accent: #FF6543;
            --divider: rgba(0, 0, 0, 0.08);

            --domino-gradient: linear-gradient(135deg, #FF9421 0%, #F8475E 34%, #F020B3 66%, #8636F8 100%);

            --eyebrow-size: clamp(0.95rem, 1.3vw, 1.35rem);
            --headline-size: clamp(2.75rem, 6.2vw, 6rem);
            --subline-size: clamp(1.1rem, 1.7vw, 1.6rem);

            --slide-padding: clamp(2rem, 6vw, 6rem);
            --content-gap: clamp(1rem, 2.5vw, 2.5rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: var(--slide-padding);
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            align-items: center;
            gap: clamp(2rem, 5vw, 5rem);
            position: relative;
        }

        .text-block {
            display: flex;
            flex-direction: column;
            gap: var(--content-gap);
            max-width: 100%;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: var(--eyebrow-size);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.75em;
        }

        .eyebrow::before {
            content: '';
            width: clamp(2rem, 3vw, 3rem);
            height: 2px;
            background: var(--accent);
            display: inline-block;
        }

        .headline {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: var(--headline-size);
            line-height: 1.02;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .headline .accent-line {
            display: block;
            background: var(--domino-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .subline {
            font-family: var(--font-body);
            font-size: var(--subline-size);
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-secondary);
            max-width: 34ch;
        }

        /* ===========================================
           ILLUSTRATION (right) - speed + rigor, unified:
           Left = fast flowing gradient curves (speed)
           Right = structured grid of dots (rigor)
           Center = unified platform node
           =========================================== */
        .illustration {
            width: 100%;
            height: 100%;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .illustration svg {
            width: 100%;
            height: auto;
            max-height: 75vh;
            overflow: visible;
        }

        /* Flowing speed curves — animated drift */
        .speed-curve {
            stroke-dasharray: 4 6;
            animation: flow 5s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: -100; }
        }

        /* Platform center node pulses subtly */
        .platform-pulse {
            animation: pulse-center 3s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }
        @keyframes pulse-center {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.9; }
        }

        /* ===========================================
           CORNER LOGO + EXPORT BUTTONS
           =========================================== */
        .corner-logo {
            position: fixed;
            bottom: clamp(1rem, 2vw, 1.75rem);
            left: clamp(1.5rem, 3vw, 2.5rem);
            height: clamp(22px, 2.4vw, 32px);
            width: auto;
            z-index: 1000;
            pointer-events: none;
        }

        .export-btns {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1001;
            display: flex;
            gap: 6px;
        }

        .export-btn {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.4);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .export-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            color: rgba(0, 0, 0, 0.7);
        }

        .export-btn:disabled { opacity: 0.5; cursor: wait; }

        /* ===========================================
           RESPONSIVE
           =========================================== */
        @media (max-width: 900px) {
            .slide {
                grid-template-columns: 1fr;
                gap: clamp(1rem, 3vw, 2rem);
            }
            .illustration { max-height: 35vh; }
            .illustration svg { max-height: 30vh; }
        }

        @media (max-height: 700px) {
            :root {
                --slide-padding: clamp(1.5rem, 4vw, 3rem);
                --headline-size: clamp(2.25rem, 5.5vw, 4.5rem);
            }
        }

        @media (max-height: 600px) {
            :root {
                --slide-padding: clamp(1rem, 3vw, 2rem);
                --headline-size: clamp(1.75rem, 5vw, 3.5rem);
                --subline-size: clamp(0.9rem, 1.5vw, 1.25rem);
                --content-gap: clamp(0.75rem, 1.5vw, 1.25rem);
            }
        }

        @media print {
            .export-btns, .corner-logo { display: none !important; }
            html, body { height: auto; background: #FFFFFF !important; }
            .slide { height: 100vh; overflow: hidden; break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            .speed-curve, .platform-pulse { animation: none; }
            .speed-curve { stroke-dasharray: none; }
        }
    </style>
</head>
<body>

    <div class="export-btns">
        <button class="export-btn" onclick="document.querySelectorAll('.slide').forEach(s=>s.classList.add('visible'));setTimeout(()=>window.print(),100)" title="Export to PDF">PDF</button>
        <button class="export-btn" id="pptBtn" onclick="exportToPPT()" title="Download as PowerPoint">PPT</button>
    </div>

    <img src="domino-logo.png" class="corner-logo" alt="Domino">

    <section class="slide">
        <div class="text-block">
            <div class="eyebrow">The Mandate</div>
            <h1 class="headline">
                Fast enough to matter.
                <span class="accent-line">Defensible enough to survive.</span>
            </h1>
            <p class="subline">
                FDA is pushing RWE into accelerated approval. Payers demand it for coverage. Not either/or — both, on one platform.
            </p>
        </div>

        <!-- Speed + Rigor unified on one platform:
             Left = dynamic flowing gradient curves (speed)
             Right = structured grid of dots (rigor)
             Center = unified platform mark bridging both -->
        <div class="illustration" aria-hidden="true">
            <svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="domino-grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FF9421"/>
                        <stop offset="34%" stop-color="#F8475E"/>
                        <stop offset="66%" stop-color="#F020B3"/>
                        <stop offset="100%" stop-color="#8636F8"/>
                    </linearGradient>
                </defs>

                <!-- ===== LEFT: SPEED — dynamic flowing curves ===== -->
                <g fill="none" stroke="url(#domino-grad-3)" stroke-width="2.5" stroke-linecap="round">
                    <path class="speed-curve" d="M 40,120 Q 110,100 190,170"/>
                    <path class="speed-curve" d="M 30,180 Q 110,170 195,205" style="animation-delay: -1s;"/>
                    <path class="speed-curve" d="M 40,240 Q 110,260 190,225" style="animation-delay: -2s;"/>
                    <path class="speed-curve" d="M 30,300 Q 110,310 195,260" style="animation-delay: -3s;"/>
                </g>

                <!-- Arrowhead marks on speed curves (suggest motion) -->
                <g fill="url(#domino-grad-3)">
                    <polygon points="190,170 182,165 184,176"/>
                    <polygon points="195,205 187,200 188,211"/>
                    <polygon points="190,225 183,220 184,231"/>
                    <polygon points="195,260 187,255 188,266"/>
                </g>

                <!-- Speed label -->
                <text x="40" y="90"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="2"
                      fill="#000">SPEED</text>
                <text x="40" y="350"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="1.5"
                      fill="#777384">FAST ENOUGH TO MATTER</text>

                <!-- ===== CENTER: ONE PLATFORM ===== -->
                <!-- Outer ring -->
                <circle cx="260" cy="210" r="38"
                        fill="none" stroke="#000" stroke-width="1.5"/>
                <!-- Inner solid mark -->
                <circle class="platform-pulse" cx="260" cy="210" r="20" fill="#000"/>

                <!-- Platform label -->
                <text x="260" y="282"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="2.5"
                      text-anchor="middle" fill="#000">ONE PLATFORM</text>

                <!-- ===== RIGHT: RIGOR — structured grid ===== -->
                <g>
                    <!-- Grid frame -->
                    <rect x="335" y="130" width="145" height="160" rx="4"
                          fill="none" stroke="#000" stroke-width="1.5"/>

                    <!-- Grid dots (4 cols x 4 rows) -->
                    <g fill="#000">
                        <circle cx="360" cy="155" r="3.5"/>
                        <circle cx="400" cy="155" r="3.5"/>
                        <circle cx="440" cy="155" r="3.5"/>
                        <circle cx="470" cy="155" r="3.5"/>

                        <circle cx="360" cy="190" r="3.5"/>
                        <circle cx="400" cy="190" r="3.5" fill="#FF6543"/>
                        <circle cx="440" cy="190" r="3.5"/>
                        <circle cx="470" cy="190" r="3.5"/>

                        <circle cx="360" cy="225" r="3.5"/>
                        <circle cx="400" cy="225" r="3.5"/>
                        <circle cx="440" cy="225" r="3.5"/>
                        <circle cx="470" cy="225" r="3.5"/>

                        <circle cx="360" cy="260" r="3.5"/>
                        <circle cx="400" cy="260" r="3.5"/>
                        <circle cx="440" cy="260" r="3.5"/>
                        <circle cx="470" cy="260" r="3.5"/>
                    </g>

                    <!-- Grid lines (subtle structure) -->
                    <g stroke="#777384" stroke-width="0.75" opacity="0.5">
                        <line x1="360" y1="155" x2="470" y2="155"/>
                        <line x1="360" y1="190" x2="470" y2="190"/>
                        <line x1="360" y1="225" x2="470" y2="225"/>
                        <line x1="360" y1="260" x2="470" y2="260"/>
                        <line x1="360" y1="155" x2="360" y2="260"/>
                        <line x1="400" y1="155" x2="400" y2="260"/>
                        <line x1="440" y1="155" x2="440" y2="260"/>
                        <line x1="470" y1="155" x2="470" y2="260"/>
                    </g>
                </g>

                <!-- Rigor label -->
                <text x="480" y="90"
                      font-family="'JetBrains Mono', monospace"
                      font-size="12" font-weight="500" letter-spacing="2"
                      text-anchor="end" fill="#000">RIGOR</text>
                <text x="480" y="320"
                      font-family="'JetBrains Mono', monospace"
                      font-size="10" letter-spacing="1.5"
                      text-anchor="end" fill="#777384">DEFENSIBLE ENOUGH TO SURVIVE</text>

                <!-- Connecting lines: both halves attach to the platform -->
                <g stroke="#000" stroke-width="1.5" fill="none" opacity="0.4">
                    <line x1="200" y1="210" x2="222" y2="210"/>
                    <line x1="298" y1="210" x2="335" y2="210"/>
                </g>
            </svg>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script>
        async function exportToPPT() {
            const btn = document.getElementById('pptBtn');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                const pptx = new PptxGenJS();
                pptx.defineLayout({ name: 'HD', width: 13.333, height: 7.5 });
                pptx.layout = 'HD';

                const s = pptx.addSlide();
                s.background = { color: 'FFFFFF' };

                s.addText('THE MANDATE', {
                    x: 0.7, y: 2.0, w: 7, h: 0.4,
                    fontSize: 14, fontFace: 'Arial',
                    color: 'FF6543', bold: true, charSpacing: 3,
                });

                s.addText([
                    { text: 'Fast enough to matter.\n', options: { color: '000000' } },
                    { text: 'Defensible enough to survive.', options: { color: 'F020B3' } },
                ], {
                    x: 0.7, y: 2.6, w: 7, h: 2.4,
                    fontSize: 48, fontFace: 'Arial', bold: true,
                });

                s.addText(
                    'FDA is pushing RWE into accelerated approval. Payers demand it for coverage. Not either/or — both, on one platform.',
                    {
                        x: 0.7, y: 5.2, w: 7, h: 1.4,
                        fontSize: 18, fontFace: 'Arial', color: '3C3A42',
                    }
                );

                s.addText('SPEED   +   RIGOR   =   ONE PLATFORM', {
                    x: 8.0, y: 4.0, w: 5.0, h: 0.5,
                    fontSize: 12, fontFace: 'Arial',
                    color: '777384', charSpacing: 2,
                });

                await pptx.writeFile({ fileName: 'rwe-mandate-slide.pptx' });
            } catch (e) {
                console.error('PPT export failed:', e);
                alert('PPT export failed. See console.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'PPT';
            }
        }
    </script>
</body>
</html>
